<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Survival Game</title>
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <canvas
      id="unity-canvas"
      width="500"
      height="1000"
      tabindex="-1"
      style="width: 100%; height: 100dvh; background: #231f20"
    ></canvas>
    <script src="Build/cb-gunfu-build.loader.js"></script>
    <script>
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";

        document.body.style.textAlign = "left";

      }

      createUnityInstance(
        document.querySelector('#unity-canvas'),
        {
          arguments: [],
          dataUrl: 'Build/cb-gunfu-build.data',
          frameworkUrl: 'Build/cb-gunfu-build.framework.js',
          codeUrl: 'Build/cb-gunfu-build.wasm',
          streamingAssetsUrl: 'StreamingAssets',
          companyName: 'Uptopia',
          productName: 'Gunlock',
          productVersion: '0.5',
          // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
          // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
        },
        (progress) => {
          window.parent.postMessage({ type: 'unityProgress', progress: Math.round(progress * 100) }, '*');
          if (progress === 1) {
            window.parent.postMessage({ type: 'unityReady' }, '*');
          }
        },
      )
        .then((unityInstance) => {
          // Store Unity instance globally for use in .jslib
          unityInstanceGlobal = unityInstance;
          window.unityInstance = unityInstance;

          // Scale canvas after Unity is loaded
          setTimeout(function () {
            ScaleUnityCanvas(true, true);
          }, 100);
        })
        .catch((message) => {
          alert(message);
        });

      window.SendUnityPostMessage = function(obj) {
    console.log("[WebGL] Post Message:", obj);
    try {
      window.parent.postMessage(obj, "*");
    } catch (e) {
      console.warn("[WebGL] Failed to post message", e);
    }
  };
    </script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            height: 100dvh;
        }

        #unity-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            /* width: 100vw;
            height: 100vh; */
            object-fit: contain;
            width: 100%;
            height: 100%;
            /* max-width: 420px;
            max-height: 639px; */
        }
    </style>
    <script>
        // Global Unity instance reference
        var unityInstanceGlobal = null;
        
        /**
         * Scale Unity WebGL canvas to fit parent container
         * Dynamic aspect ratio adapts to parent size within defined constraints
         * Can be called from Unity .jslib files
         * 
         * @param {boolean} maintainAspectRatio - Whether to maintain aspect ratio (default: true)
         * @param {boolean} useParentSize - Whether to use parent container size (default: true)
         */
        function ScaleUnityCanvas(maintainAspectRatio = true, useParentSize = true) {
            const canvas = document.querySelector("#unity-canvas");
            if (!canvas) {
                console.warn("Unity canvas not found!");
                return;
            }

            // Get parent container (body or custom container)
            const parent = canvas.parentElement;
            
            // Aspect ratio constraints (width/height)
            const MIN_ASPECT_RATIO = 9 / 21;  // ≈0.428 (narrower, more portrait)

            if (useParentSize && parent) {
                // Fall back to viewport if parent has no rendered dimensions (e.g. body without explicit height)
                const parentWidth = parent.clientWidth || window.innerWidth;
                const parentHeight = parent.clientHeight || window.innerHeight;

                if (maintainAspectRatio) {
                    // Calculate parent's aspect ratio
                    const parentAspectRatio = parentWidth / parentHeight;
                    
                    // Clamp aspect ratio within allowed range (no upper bound)
                    const targetAspectRatio = Math.max(MIN_ASPECT_RATIO, parentAspectRatio);
                    
                    let newWidth, newHeight;
                    
                    // Scale canvas to fill parent while respecting aspect ratio constraint
                    if (parentAspectRatio > targetAspectRatio) {
                        // Parent is wider than allowed - fit to height
                        newHeight = parentHeight;
                        newWidth = newHeight * targetAspectRatio;
                    } else {
                        // Parent is narrower - fit to width
                        newWidth = parentWidth;
                        newHeight = newWidth / targetAspectRatio;
                    }

                    canvas.style.width = newWidth + "px";
                    canvas.style.height = newHeight + "px";
                    
                    console.log("Canvas scaled with dynamic aspect ratio:", 
                        targetAspectRatio.toFixed(3), 
                        `(${newWidth}px x ${newHeight}px)`);
                } else {
                    // Fill parent completely without maintaining aspect ratio
                    canvas.style.width = parentWidth + "px";
                    canvas.style.height = parentHeight + "px";
                }
            } else {
                // Fallback: use viewport dimensions
                if (maintainAspectRatio) {
                    const viewportWidth = window.innerWidth;
                    const viewportHeight = window.innerHeight;
                    const viewportAspectRatio = viewportWidth / viewportHeight;
                    
                    // Clamp aspect ratio within allowed range (no upper bound)
                    const targetAspectRatio = Math.max(MIN_ASPECT_RATIO, viewportAspectRatio);
                    
                    let newWidth, newHeight;
                    
                    if (viewportAspectRatio > targetAspectRatio) {
                        newHeight = viewportHeight;
                        newWidth = newHeight * targetAspectRatio;
                    } else {
                        newWidth = viewportWidth;
                        newHeight = newWidth / targetAspectRatio;
                    }

                    canvas.style.width = newWidth + "px";
                    canvas.style.height = newHeight + "px";
                } else {
                    canvas.style.width = "100%";
                    canvas.style.height = "100%";
                }
            }

            // Notify Unity instance if available
            if (unityInstanceGlobal && unityInstanceGlobal.SendMessage) {
                try {
                    // Optional: Send message to Unity when canvas is resized
                    // unityInstanceGlobal.SendMessage("GameController", "OnCanvasResized", "");
                } catch (e) {
                    console.log("Could not send message to Unity:", e);
                }
            }
        }

        // Legacy function for backward compatibility
        function resizeCanvas() {
            ScaleUnityCanvas(true, true);
        }

        // Auto-resize: ResizeObserver reacts to ANY parent size change
        // (window resize, iframe CSS resize, parent JS resize, etc.)
        var _resizeObserver = new ResizeObserver(function() {
            ScaleUnityCanvas(true, true);
        });
        _resizeObserver.observe(document.documentElement);

        window.addEventListener('load', function() {
            ScaleUnityCanvas(true, true);
        });

        // Make function globally accessible for .jslib
        window.ScaleUnityCanvas = ScaleUnityCanvas;
    </script>
  </body>
</html>
